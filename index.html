<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birds Executive Hub</title>
  <link rel="stylesheet" href="tailwind.min.css?v=90">
  <link rel="stylesheet" href="css/app.css?v=90">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300843D'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>B</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5B8C7A">
  <script src="xlsx.full.min.js?v=90"></script>
  <script src="chart.js?v=90"></script>
  <script src="jspdf.umd.min.js?v=90"></script>
  <script src="jspdf.plugin.autotable.min.js?v=90"></script>
  <script src="html2canvas.min.js?v=90"></script>
  <script src="jszip.min.js?v=90"></script>
  <script src="papaparse.min.js?v=90"></script>
  <style>
    .nav-tab-bar{display:flex;gap:6px;margin-bottom:0;}
    .nav-tab{flex:1;padding:14px 16px;border-radius:16px 16px 0 0;font-weight:900;font-size:14px;letter-spacing:.06em;text-transform:uppercase;text-align:center;cursor:pointer;border:2px solid transparent;border-bottom:none;transition:all .2s;opacity:.55;}
    .nav-tab:hover{opacity:.8;}
    .nav-tab.active{opacity:1;border-color:var(--tab-color);background:var(--tab-bg);color:var(--tab-color);}
    .nav-panel{display:none;padding:12px 16px;background:var(--panel-bg);border:2px solid var(--tab-color);border-top:none;border-radius:0 0 16px 16px;margin-bottom:24px;flex-wrap:wrap;gap:6px;}
    .nav-panel.open{display:flex;}
    .nav-tab[data-tab="sales"]{--tab-color:#059669;--tab-bg:#ecfdf5;}
    .nav-tab[data-tab="audits"]{--tab-color:#d97706;--tab-bg:#fffbeb;}
    .nav-tab[data-tab="docs"]{--tab-color:#2563eb;--tab-bg:#eff6ff;}
    .nav-panel[data-panel="sales"]{--tab-color:#059669;--panel-bg:#f0fdf4;}
    .nav-panel[data-panel="audits"]{--tab-color:#d97706;--panel-bg:#fefce8;}
    .nav-panel[data-panel="docs"]{--tab-color:#2563eb;--panel-bg:#f0f9ff;}
  </style>
</head>
<body class="bg-slate-50 font-sans antialiased">
  <div class="max-w-[1800px] mx-auto p-4 md:p-8">

    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-6 header-glass p-5 rounded-3xl">
      <div class="flex items-center gap-3 w-full md:w-auto">
        <img src="logo.png" alt="Birds" class="h-[100px] w-auto">
        <div>
          <h1 class="text-xl md:text-[28px] font-extrabold outfit birds-green leading-tight tracking-tight" style="color:#5B8C7A">Sales Hub</h1>
          <div class="flex items-center gap-2 flex-wrap">
            <span id="activeWeekBadge" class="bg-slate-700 text-white text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider">LATEST DATA</span>
            <p id="ingestStatus" class="text-slate-400 text-xs font-bold">&mdash;</p>
            <span id="missingWeeksBadge" class="text-[10px] font-black text-amber-600"></span>
            <span id="lastSyncedBadge" class="text-[10px] font-bold text-slate-400"></span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-3 flex-wrap">
        <button onclick="startAudit()" class="bg-amber-500 hover:bg-amber-600 text-white text-xs font-black px-4 py-2.5 rounded-full transition-colors shadow-md whitespace-nowrap" title="Perform a retail audit">Audit Store</button>
        <input type="file" id="mobileAuditZipInput" accept=".zip" class="hidden" onchange="importMobileAuditZIP(event)">
        <button onclick="document.getElementById('mobileAuditZipInput').click()" class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-black px-4 py-2.5 rounded-full transition-colors shadow-md whitespace-nowrap" title="Import audit ZIP from mobile app">Import Mobile Audit</button>
        <button onclick="doRefresh()" class="btn-secondary rounded-none text-sm whitespace-nowrap" id="syncBtn" title="Refresh Data">
          &#x21bb; Refresh
        </button>
        <span id="folderStatus" class="text-[10px] font-bold text-slate-400"></span>
        <span id="userBadge" class="hidden text-xs font-bold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full">Signed in</span>
        <button id="signOutBtn" onclick="GraphAPI.logout(); location.reload()" class="hidden text-[10px] font-bold text-red-500 hover:text-red-700 px-2 py-1 rounded transition-colors">Sign Out</button>
        <button onclick="showTempAdminLogin()" class="text-slate-300 hover:text-slate-500 transition-colors" title="Temporary Admin Login (DEV)" id="padlockBtn">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </button>
      </div>
    </header>

    <!-- Horizontal Tab Navigation -->
    <nav>
      <div class="nav-tab-bar">
        <div class="nav-tab active" data-tab="sales" onclick="setActiveTab('sales')">Sales &amp; KPIs</div>
        <div class="nav-tab" data-tab="audits" onclick="setActiveTab('audits')">Audits &amp; Complaints</div>
        <div class="nav-tab" data-tab="docs" onclick="setActiveTab('docs')">Documents</div>
      </div>
      <div class="nav-panel open" data-panel="sales">
        <button onclick="setView('overview')" id="btn-overview" class="seg-btn seg-btn-active flex-1 whitespace-nowrap">Overview</button>
        <button onclick="setView('trends')" id="btn-trends" class="seg-btn flex-1 whitespace-nowrap">Trends</button>
        <button onclick="setView('masterreview')" id="btn-masterreview" class="seg-btn flex-1 whitespace-nowrap">Quarterly Summary</button>
        <span class="nav-divider"></span>
        <button onclick="setView('areas')" id="btn-areas" class="seg-btn flex-1 whitespace-nowrap">Area Report</button>
        <button onclick="setView('storecards')" id="btn-storecards" class="seg-btn flex-1 whitespace-nowrap">Scorecards</button>
        <button onclick="setView('storereports')" id="btn-storereports" class="seg-btn flex-1 whitespace-nowrap">Store Report</button>
        <button onclick="setView('leaderboard')" id="btn-leaderboard" class="seg-btn flex-1 whitespace-nowrap">Leaderboard</button>
        <button onclick="setView('banding')" id="btn-banding" class="seg-btn flex-1 whitespace-nowrap">Banding</button>
        <span class="nav-divider"></span>
        <button onclick="setView('halloffame')" id="btn-halloffame" class="seg-btn flex-1 whitespace-nowrap">YTD Awards</button>
        <button onclick="setView('winners')" id="btn-winners" class="seg-btn flex-1 whitespace-nowrap">Podium</button>
        <button onclick="setView('champions')" id="btn-champions" class="seg-btn flex-1 whitespace-nowrap">Champions</button>
      </div>
      <div class="nav-panel" data-panel="audits">
        <button onclick="setView('auditexport')" id="btn-auditexport" class="seg-btn flex-1 whitespace-nowrap">Audit Action Hub</button>
        <button onclick="setView('tracker')" id="btn-tracker" class="seg-btn flex-1 whitespace-nowrap">Tracker</button>
        <button onclick="setView('complaints')" id="btn-complaints" class="seg-btn flex-1 whitespace-nowrap">Complaints Hub</button>
      </div>
      <div class="nav-panel" data-panel="docs">
        <button onclick="setView('documents')" id="btn-documents" class="seg-btn flex-1 whitespace-nowrap">Document Hub</button>
        <button onclick="setView('documentarchive')" id="btn-documentarchive" class="seg-btn flex-1 whitespace-nowrap">Archive</button>
        <button onclick="setView('documentcreate')" id="btn-documentcreate" class="seg-btn flex-1 whitespace-nowrap">Create Document</button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main id="mainView" class="space-y-6"></main>
  </div>

  <!-- Sign-In Overlay -->
  <div id="signInOverlay" class="fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md mx-4 p-8 text-center">
      <img src="logo.png" alt="Birds" class="h-16 w-auto mx-auto mb-4">
      <h2 class="text-xl font-black outfit birds-green mb-2">Sales Hub</h2>
      <p class="text-sm text-slate-500 mb-6">Sign in with your Birds of Derby Microsoft account to access the dashboard.</p>
      <button onclick="doSignIn()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-4 rounded-2xl text-lg shadow-lg transition-colors flex items-center justify-center gap-3">
        <svg class="w-6 h-6" viewBox="0 0 21 21" fill="none"><path d="M10 2L2 7v8l8 5 8-5V7l-8-5z" fill="#fff"/><path d="M10 2v18m8-13H2" stroke="#fff" stroke-width="1.5"/></svg>
        Sign in with Microsoft
      </button>
      <button onclick="showTempAdminLogin()" class="mt-4 text-xs font-bold text-slate-400 hover:text-amber-500 transition-colors flex items-center justify-center gap-1.5 mx-auto">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        Temp Admin Login
      </button>
      <p id="signInError" class="text-xs font-bold text-red-500 mt-4 hidden"></p>
    </div>
  </div>

  <!-- Temp Admin Login Modal -->
  <div id="tempAdminModal" class="fixed inset-0 z-[60] flex items-center justify-center hidden" style="background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm mx-4 p-8 text-center">
      <svg class="w-10 h-10 mx-auto mb-3 text-amber-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
      <h3 class="text-lg font-black text-slate-800 mb-1">Temp Admin Access</h3>
      <p class="text-xs text-slate-400 mb-5">For testing only — will be removed before deployment.</p>
      <input type="text" id="tempAdminUser" placeholder="Username" class="w-full border border-slate-200 p-2.5 rounded-xl text-sm mb-3 focus:ring-2 focus:ring-amber-400 outline-none" autocomplete="off">
      <input type="password" id="tempAdminPass" placeholder="Password" class="w-full border border-slate-200 p-2.5 rounded-xl text-sm mb-4 focus:ring-2 focus:ring-amber-400 outline-none" autocomplete="off">
      <p id="tempAdminError" class="text-xs font-bold text-red-500 mb-3 hidden">Invalid credentials</p>
      <div class="flex gap-2">
        <button onclick="closeTempAdminLogin()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-sm py-2.5 rounded-xl transition-colors">Cancel</button>
        <button onclick="doTempAdminLogin()" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm py-2.5 rounded-xl transition-colors shadow-md">Sign In</button>
      </div>
    </div>
  </div>

  <!-- Scripts: db first (defines globals + DB), utils (helpers), then features, app last -->
  <script src="js/db.js?v=90"></script>
  <script src="js/utils.js?v=90"></script>
  <script src="js/sharepoint.js?v=90"></script>
  <script src="js/graph.js?v=90"></script>
  <script src="js/data.js?v=90"></script>
  <script src="js/charts.js?v=90"></script>
  <script src="js/scorecards.js?v=90"></script>
  <script src="js/reports.js?v=91"></script>
  <script src="js/complaints.js?v=91"></script>
  <script src="js/documents.js?v=90"></script>
  <script src="js/audits.js?v=90"></script>
  <script src="js/tracker.js?v=91"></script>
  <script src="js/awards.js?v=90"></script>
  <script src="js/audit-perform.js?v=90"></script>
  <script src="js/app.js?v=91"></script>
  <script>
    // Tab switching (the only new UI addition - maps 3-tab layout to original setView)
    var _activeTab = 'sales';
    var _tabDefaults = { sales: 'overview', audits: 'auditexport', docs: 'documents' };
    function setActiveTab(tab) {
      if (tab === _activeTab) return; // Already on this tab, skip
      _activeTab = tab;
      document.querySelectorAll('.nav-tab').forEach(function(t) {
        t.classList.toggle('active', t.getAttribute('data-tab') === tab);
      });
      document.querySelectorAll('.nav-panel').forEach(function(p) {
        p.classList.toggle('open', p.getAttribute('data-panel') === tab);
      });
      // Switch view to default for this tab
      var defaultView = _tabDefaults[tab];
      if (defaultView && typeof setView === 'function') setView(defaultView);
    }

    // PNG export for scorecards and audit views
    function exportToPNG(elementId, filename) {
      var el = document.getElementById(elementId);
      if(!el) return;
      if (typeof html2canvas === 'undefined') {
        var script = document.createElement('script');
        script.src = './html2canvas.min.js';
        script.onload = function() { doExport(el, filename); };
        document.head.appendChild(script);
      } else {
        doExport(el, filename);
      }
    }
    function doExport(el, filename) {
      var btns = el.querySelectorAll('.export-btn');
      btns.forEach(function(b) { b.style.display = 'none'; });
      html2canvas(el, { scale: 2.5, useCORS: true, backgroundColor: '#ffffff', logging: false }).then(function(canvas) {
        btns.forEach(function(b) { b.style.display = ''; });
        var link = document.createElement('a');
        link.download = filename + '.png';
        link.href = canvas.toDataURL('image/png');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    }

    // Settings modal helpers
    async function doRefresh() {
      var isCloud = window.__azureConfig && typeof GraphAPI !== 'undefined' && GraphAPI.isAuthenticated();
      if (!isCloud) {
        alert('Not connected to SharePoint. Please sign in.');
        return;
      }
      const btn = document.getElementById('syncBtn');
      const origText = btn.innerHTML;
      btn.innerHTML = '&#x21bb; Syncing...';
      btn.disabled = true;
      btn.classList.add('opacity-50','cursor-not-allowed');
      try {
        const stores = ['kpi','audits','complaints','ingest_log',
                        'area_winners_log','area_metric_winners_log','store_winners_log'];
        for (const s of stores) { try { await idbClear(s); } catch(e) {} }
        storeMap.clear(); originalStoreNames.clear();
        window.ComplaintsData = null;
        await syncData();
      } catch(e) {
        console.error('[Refresh] Sync failed:', e);
        alert('Refresh failed: ' + e.message);
      } finally {
        btn.innerHTML = origText;
        btn.disabled = false;
        btn.classList.remove('opacity-50','cursor-not-allowed');
      }
    }
    // TEMP ADMIN LOGIN — REMOVE BEFORE DEPLOYMENT
    window.showTempAdminLogin = function() {
      document.getElementById('tempAdminModal').classList.remove('hidden');
      document.getElementById('tempAdminUser').value = '';
      document.getElementById('tempAdminPass').value = '';
      document.getElementById('tempAdminError').classList.add('hidden');
      document.getElementById('tempAdminUser').focus();
    };
    window.closeTempAdminLogin = function() {
      document.getElementById('tempAdminModal').classList.add('hidden');
    };
    window.doTempAdminLogin = function() {
      var u = document.getElementById('tempAdminUser').value.trim();
      var p = document.getElementById('tempAdminPass').value;
      if (u === 'admin' && p === '2468') {
        window.__tempAdmin = true;
        document.getElementById('tempAdminModal').classList.add('hidden');
        document.getElementById('signInOverlay').classList.add('hidden');
        document.getElementById('userBadge').textContent = 'Admin (Temp)';
        document.getElementById('userBadge').classList.remove('hidden');
        document.getElementById('folderStatus').textContent = 'Status: Temp Admin Mode';
        window.isAdmin = function() { return true; };
        if (typeof syncData === 'function') syncData();
      } else {
        document.getElementById('tempAdminError').classList.remove('hidden');
      }
    };
    // END TEMP ADMIN LOGIN

    window.doSignIn = async function() {
      var errorEl = document.getElementById('signInError');
      errorEl.classList.add('hidden');
      try { await GraphAPI.acquireToken(); } catch(e) { errorEl.textContent = 'Sign-in failed: ' + e.message; errorEl.classList.remove('hidden'); return; }
      if (GraphAPI.isAuthenticated()) {
        document.getElementById('signInOverlay').classList.add('hidden');
        document.getElementById('userBadge').classList.remove('hidden');
        document.getElementById('signOutBtn').classList.remove('hidden');
        document.getElementById('folderStatus').textContent = 'Status: Connected to SharePoint';
        try { await syncData(); } catch(e) { console.warn('[Sync] Initial sync failed:', e); }
      }
    };
    async function clearAllData() {
      if (!confirm('This will delete ALL stored data. Continue?')) return;
      if (!db) { alert('Database not ready.'); return; }
      await idbClear('kpi'); await idbClear('audits'); await idbClear('stores');
      await idbClear('actions'); await idbClear('settings'); await idbClear('area_winners_log');
      await idbClear('area_metric_winners_log'); await idbClear('store_winners_log');
      await idbClear('ingest_log'); await idbClear('tracker_audits'); await idbClear('eho_data');
      await idbClear('complaints');
      storeMap.clear(); originalStoreNames.clear();
      window.ComplaintsData = null;
      document.getElementById('mainView').innerHTML = '<div class="p-20 text-center"><h2 class="text-2xl font-black outfit text-slate-800 mb-2">Data Cleared</h2><p class="text-slate-500 mb-6">Refresh to reload data from SharePoint.</p></div>';
    }

    // Boot: auto-sync from local folder on load
    (function() {
      // Load EHO ratings
      if (typeof window.loadEHORatings === 'function') {
        window.loadEHORatings();
      }
    })();

    // Diagnostic: Test xlsx write to SharePoint (removed — cloud-only)
    window.testXlsxWrite = async function() {
      alert('Local folder write is no longer supported. Sign in to SharePoint to save.');
    };
  </script>
  <script>
    // Preload logo for PDF exports
    (function() { var img = new Image(); img.onload = function() { window.__pdfLogo = img; }; img.src = 'logo.png'; })();
  </script>
  <script>
    // Register fresh service worker after all scripts loaded
    window.addEventListener('load', function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(function(reg) {
          console.log('[SW] Registered ' + (reg.installing ? 'installing' : reg.active ? reg.active.scriptURL : 'unknown'), 'scope:', reg.scope);
        }).catch(function(err) {
          console.warn('[SW] Registration failed:', err);
        });
      }
    });
  </script>
</body>
</html>
