<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Hub — Birds of Derby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tailwind.min.css?v=100">
  <link rel="stylesheet" href="css/app.css?v=100">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300843D'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>B</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8BA88A">
  <script src="xlsx.full.min.js?v=100"></script>
  <script src="chart.js?v=100"></script>
  <script src="jspdf.umd.min.js?v=100"></script>
  <script src="jspdf.plugin.autotable.min.js?v=100"></script>
  <script src="html2canvas.min.js?v=100"></script>
  <script src="jszip.min.js?v=100"></script>
  <script src="papaparse.min.js?v=100"></script>
  <style>
    .nav-tab-bar{display:flex;gap:0;margin-bottom:0;background:#fff;border:1px solid #E8E5E0;border-radius:12px;overflow:hidden;}
    .nav-tab{flex:1;padding:12px 16px;font-family:'Merriweather',Georgia,serif;font-weight:700;font-size:13px;letter-spacing:.03em;text-transform:uppercase;text-align:center;cursor:pointer;border:none;transition:all .2s;opacity:.6;color:#4A4A4A;background:transparent;position:relative;}
    .nav-tab:hover{opacity:.85;}
    .nav-tab.active{opacity:1;color:#6E8E6D;background:transparent;border-bottom:2px solid #8BA88A;}
    .nav-tab .alert-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#D94F4F;margin-left:4px;vertical-align:middle;}
    .nav-panel{display:none;padding:10px 12px;background:rgba(248,246,242,0.5);border:1px solid #E8E5E0;border-top:none;border-radius:0 0 12px 12px;margin-bottom:24px;flex-wrap:wrap;gap:6px;}
    .nav-panel.open{display:flex;}
    .nav-tab[data-tab="sales"]{--tab-color:#8BA88A;--tab-bg:rgba(139,168,138,0.08);}
    .nav-tab[data-tab="audits"]{--tab-color:#C17F4E;--tab-bg:rgba(193,127,78,0.08);}
    .nav-tab[data-tab="docs"]{--tab-color:#7A7A7A;--tab-bg:rgba(122,122,122,0.08);}
    .nav-panel[data-panel="sales"]{--tab-color:#8BA88A;--panel-bg:rgba(139,168,138,0.04);}
    .nav-panel[data-panel="audits"]{--tab-color:#C17F4E;--panel-bg:rgba(193,127,78,0.04);}
    .nav-panel[data-panel="docs"]{--tab-color:#7A7A7A;--panel-bg:rgba(122,122,122,0.04);}
    @media print {
      body * { visibility: hidden; }
      #print-doc-area, #print-doc-area * { visibility: visible; }
      #print-doc-area { position: absolute; left: 0; top: 0; width: 100%; }
      .nav-tab, .seg-btn, .filter-group, #syncBtn, .export-btn { display: none !important; }
    }
  </style>
</head>
<body style="background-color:#F8F6F2;color:#4A4A4A;font-family:'Inter',system-ui,-apple-system,sans-serif;margin:0;padding:0;-webkit-font-smoothing:antialiased;">
  <div class="max-w-[1400px] mx-auto p-4 md:p-6">

    <!-- Header -->
    <header class="mb-4 header-glass p-4">
      <div class="flex items-center justify-between w-full flex-wrap gap-4">
        <!-- Left: Logo + Status -->
        <div class="flex items-center gap-3">
          <img src="logo.png" alt="Birds Bakery" class="h-[60px] w-auto logo-mark" style="font-family:'Merriweather',Georgia,serif;">
          <div>
            <div class="flex items-center gap-2 flex-wrap">
              <span id="activeWeekBadge" style="background:#6E8E6D;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:9999px;text-transform:uppercase;letter-spacing:0.05em;">Latest Data</span>
              <p id="ingestStatus" style="color:#7A7A7A;font-size:11px;font-weight:600;margin:0;">—</p>
              <span id="missingWeeksBadge" onclick="renderMissingWeeksReport()" style="font-size:10px;font-weight:700;color:#D97706;cursor:pointer;" title="Click to view full missing weeks report"></span>
              <span id="lastSyncedBadge" style="font-size:10px;font-weight:600;color:#aaa;"></span>
            </div>
          </div>
        </div>
        <!-- Right: Actions -->
        <div class="flex items-center gap-2 flex-wrap">
          <button onclick="startAudit()" style="background:#C17F4E;color:#fff;font-size:11px;font-weight:700;padding:6px 14px;border-radius:8px;border:none;cursor:pointer;white-space:nowrap;" title="Perform a retail audit">Audit Store</button>
          <input type="file" id="mobileAuditZipInput" accept=".zip" class="hidden" onchange="importMobileAuditZIP(event)">
          <button onclick="document.getElementById('mobileAuditZipInput').click()" style="background:#7A7A7A;color:#fff;font-size:11px;font-weight:700;padding:6px 14px;border-radius:8px;border:none;cursor:pointer;white-space:nowrap;" title="Import audit ZIP from mobile app">Import Mobile Audit</button>
          <button onclick="doRefresh()" style="background:transparent;color:#4A4A4A;font-size:11px;font-weight:600;padding:6px 14px;border-radius:8px;border:1px solid #E8E5E0;cursor:pointer;white-space:nowrap;" id="syncBtn" title="Refresh Data">&#x21bb; Refresh</button>
          <span id="folderStatus" style="font-size:10px;font-weight:600;color:#aaa;"></span>

        </div>
      </div>
    </header>

    <!-- Horizontal Tab Navigation -->
    <nav>
      <div class="nav-tab-bar">
        <div class="nav-tab active" data-tab="sales" onclick="setActiveTab('sales')">Sales &amp; KPIs</div>
        <div class="nav-tab" data-tab="audits" onclick="setActiveTab('audits')">Audits &amp; Complaints</div>
        <div class="nav-tab" data-tab="docs" onclick="setActiveTab('docs')">Documents</div>
      </div>
      <div class="nav-panel open" data-panel="sales">
        <button onclick="setView('overview')" id="btn-overview" class="seg-btn seg-btn-active flex-1 whitespace-nowrap">Overview</button>
        <button onclick="setView('trends')" id="btn-trends" class="seg-btn flex-1 whitespace-nowrap">Trends</button>
        <button onclick="setView('masterreview')" id="btn-masterreview" class="seg-btn flex-1 whitespace-nowrap">Quarterly Summary</button>
        <span class="nav-divider"></span>
        <button onclick="setView('areas')" id="btn-areas" class="seg-btn flex-1 whitespace-nowrap">Area Report</button>
        <button onclick="setView('storecards')" id="btn-storecards" class="seg-btn flex-1 whitespace-nowrap">Scorecards</button>
        <button onclick="setView('storereports')" id="btn-storereports" class="seg-btn flex-1 whitespace-nowrap">Store Report</button>
        <button onclick="setView('leaderboard')" id="btn-leaderboard" class="seg-btn flex-1 whitespace-nowrap">Leaderboard</button>
        <button onclick="setView('banding')" id="btn-banding" class="seg-btn flex-1 whitespace-nowrap">Banding</button>
        <span class="nav-divider"></span>
        <button onclick="setView('halloffame')" id="btn-halloffame" class="seg-btn flex-1 whitespace-nowrap">YTD Awards</button>
        <button onclick="setView('winners')" id="btn-winners" class="seg-btn flex-1 whitespace-nowrap">Podium</button>
        <button onclick="setView('champions')" id="btn-champions" class="seg-btn flex-1 whitespace-nowrap">Champions</button>
      </div>
      <div class="nav-panel" data-panel="audits">
        <button onclick="setView('auditexport')" id="btn-auditexport" class="seg-btn flex-1 whitespace-nowrap">Audit Action Hub</button>
        <button onclick="setView('tracker')" id="btn-tracker" class="seg-btn flex-1 whitespace-nowrap">Tracker</button>
        <button onclick="setView('complaints')" id="btn-complaints" class="seg-btn flex-1 whitespace-nowrap">Complaints Hub</button>
      </div>
      <div class="nav-panel" data-panel="docs">
        <button onclick="setView('documents')" id="btn-documents" class="seg-btn flex-1 whitespace-nowrap">Document Hub</button>
        <button onclick="setView('documentarchive')" id="btn-documentarchive" class="seg-btn flex-1 whitespace-nowrap">Archive</button>
        <button onclick="setView('documentcreate')" id="btn-documentcreate" class="seg-btn flex-1 whitespace-nowrap">Create Document</button>
        <span class="nav-divider"></span>
        <button onclick="setView('templatelibrary')" id="btn-templatelibrary" class="seg-btn flex-1 whitespace-nowrap">Templates</button>
        <button onclick="setView('templatebuilder')" id="btn-templatebuilder" class="seg-btn flex-1 whitespace-nowrap">Create Template</button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main id="mainView" class="space-y-6"></main>
  </div>


  <!-- Scripts: db first (defines globals + DB), utils (helpers), then features, app last -->
  <script src="js/db.js?v=114"></script>
  <script src="js/utils.js?v=114"></script>
  <script src="js/data.js?v=114"></script>
  <script src="js/charts.js?v=114"></script>
  <script src="js/scorecards.js?v=114"></script>
  <script src="js/reports.js?v=114"></script>
  <script src="js/complaints.js?v=114"></script>
  <script src="js/documents.js?v=114"></script>
  <script src="js/template-builder.js?v=114"></script>
  <script src="js/audits.js?v=114"></script>
  <script src="js/tracker_defaults.js?v=114"></script>
  <script src="js/tracker.js?v=114"></script>
  <script src="js/awards.js?v=114"></script>
  <script src="js/audit-perform.js?v=114"></script>
  <script src="js/overview.js?v=114"></script>
  <script src="js/app.js?v=114"></script>
  <script>
    // Tab switching (the only new UI addition - maps 3-tab layout to original setView)
    var _activeTab = 'sales';
    var _tabDefaults = { sales: 'overview', audits: 'auditexport', docs: 'documents' };
    function setActiveTab(tab) {
      if (tab === _activeTab) return; // Already on this tab, skip
      _activeTab = tab;
      document.querySelectorAll('.nav-tab').forEach(function(t) {
        t.classList.toggle('active', t.getAttribute('data-tab') === tab);
      });
      document.querySelectorAll('.nav-panel').forEach(function(p) {
        p.classList.toggle('open', p.getAttribute('data-panel') === tab);
      });
      // Switch view to default for this tab
      var defaultView = _tabDefaults[tab];
      if (defaultView && typeof setView === 'function') setView(defaultView);
    }

    // PNG export for scorecards and audit views
    function exportToPNG(elementId, filename) {
      var el = document.getElementById(elementId);
      if(!el) return;
      if (typeof html2canvas === 'undefined') {
        var script = document.createElement('script');
        script.src = './html2canvas.min.js';
        script.onload = function() { doExport(el, filename); };
        document.head.appendChild(script);
      } else {
        doExport(el, filename);
      }
    }
    function doExport(el, filename) {
      var btns = el.querySelectorAll('.export-btn');
      btns.forEach(function(b) { b.style.display = 'none'; });
      html2canvas(el, { scale: 2.5, useCORS: true, backgroundColor: '#ffffff', logging: false }).then(function(canvas) {
        btns.forEach(function(b) { b.style.display = ''; });
        var link = document.createElement('a');
        link.download = filename + '.png';
        link.href = canvas.toDataURL('image/png');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    }

    // Settings modal helpers
    async function doRefresh() {
      const btn = document.getElementById('syncBtn');
      const origText = btn.innerHTML;
      btn.innerHTML = '&#x21bb; Syncing...';
      btn.disabled = true;
      btn.classList.add('opacity-50','cursor-not-allowed');
      try {
        const stores = ['kpi','audits','complaints','ingest_log',
                        'area_winners_log','area_metric_winners_log','store_winners_log'];
        for (const s of stores) { try { await idbClear(s); } catch(e) {} }
        storeMap.clear(); originalStoreNames.clear();
        window.ComplaintsData = null;
        await syncData();
      } catch(e) {
        console.error('[Refresh] Sync failed:', e);
        alert('Refresh failed: ' + e.message);
      } finally {
        btn.innerHTML = origText;
        btn.disabled = false;
        btn.classList.remove('opacity-50','cursor-not-allowed');
      }
    }
    async function clearAllData() {
      if (!confirm('This will delete ALL stored data. Continue?')) return;
      if (!db) { alert('Database not ready.'); return; }
      await idbClear('kpi'); await idbClear('audits'); await idbClear('stores');
      await idbClear('actions'); await idbClear('settings'); await idbClear('area_winners_log');
      await idbClear('area_metric_winners_log'); await idbClear('store_winners_log');
      await idbClear('ingest_log'); await idbClear('tracker_audits'); await idbClear('eho_data');
      await idbClear('complaints');
      storeMap.clear(); originalStoreNames.clear();
      window.ComplaintsData = null;
      document.getElementById('mainView').innerHTML = '<div class="p-20 text-center"><h2 class="text-2xl font-black outfit text-slate-800 mb-2">Data Cleared</h2><p class="text-slate-500 mb-6">Refresh to reload data from your folder.</p></div>';
    }

    // Boot: auto-sync from local folder on load
    (function() {
      // Load EHO ratings
      if (typeof window.loadEHORatings === 'function') {
        window.loadEHORatings();
      }
    })();

    // Diagnostic: Test xlsx write
    window.testXlsxWrite = async function() {
      alert('Local folder write not yet implemented.');
    };
  </script>
  <script>
    // Preload logo for PDF exports
    (function() { var img = new Image(); img.onload = function() { window.__pdfLogo = img; }; img.src = 'logo.png'; })();
  </script>
  <script>
    // Force SW update: when new SW installs, send SKIP_WAITING and reload
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js?v=114').then(function(reg) {
        function promptUpdate() {
          if (reg.waiting) {
            console.log('[SW] New SW waiting, sending SKIP_WAITING');
            reg.waiting.postMessage({type: 'SKIP_WAITING'});
          }
        }
        promptUpdate();
        reg.addEventListener('updatefound', function() {
          if (reg.installing) {
            reg.installing.addEventListener('statechange', function() {
              if (reg.installing && reg.installing.state === 'installed') {
                promptUpdate();
              }
            });
          }
        });
        console.log('[SW] Registered ' + (reg.installing ? 'installing' : reg.active ? 'active' : 'unknown'), 'scope:', reg.scope);
      }).catch(function(err) {
        console.warn('[SW] Registration failed:', err);
      });
      // Auto-reload when new SW takes control
      var _swReloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!_swReloading) {
          _swReloading = true;
          console.log('[SW] New controller, reloading...');
          window.location.reload();
        }
      });
    }
  </script>
</body>
</html>
